openapi: 3.0.1
info:
  title: Carbonio Mailbox Internal API
  description: Service-to-service REST API for carbonio-mailbox
  version: "1.0"
paths:
  /accounts/batch:
    post:
      summary: Batch Get Accounts
      description: Returns account info for a list of IDs or emails. Exactly one of
        'ids' or 'emails' must be provided. Unknown entries are silently skipped.
      operationId: batchGetAccounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRequest"
      responses:
        "200":
          description: List of Account Info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfoResponse"
        "400":
          description: "Invalid request: exactly one of 'ids' or 'emails' required,\
            \ max 100 entries"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /accounts:
    get:
      summary: Get Account by Email
      description: Returns account info by email address
      operationId: getAccountByEmail
      parameters:
      - name: email
        in: query
        description: The account email address
        schema:
          type: string
      responses:
        "200":
          description: Account Info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfoResponse"
        "400":
          description: Missing email query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /accounts/{id}/info:
    get:
      summary: Get Account Info
      description: Returns account info by ID
      operationId: getAccountInfo
      parameters:
      - name: id
        in: path
        description: The account ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Account Info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfoResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /accounts/myself:
    get:
      summary: Get Authenticated Account Info
      description: Returns account info for the authenticated user
      operationId: getMyAccountInfo
      parameters:
      - name: ZM_AUTH_TOKEN
        in: cookie
        schema:
          type: string
      - name: ZM_ADMIN_AUTH_TOKEN
        in: cookie
        schema:
          type: string
      responses:
        "200":
          description: Account Info
        "401":
          description: Invalid or missing auth token
        "404":
          description: Account not found
        "500":
          description: Internal server error
  /accounts/{id}/shared-accounts:
    get:
      summary: Get Shared Accounts
      description: Returns accounts that share folders with the given account (via
        mountpoints)
      operationId: getSharedAccounts
      parameters:
      - name: id
        in: path
        description: The account ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: List of shared accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedAccountResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /accounts/search:
    get:
      summary: Search Accounts
      description: "Searches accounts by name, email or uid. Domain is derived from\
        \ the calling user (X-Carbonio-User-Id header)."
      operationId: searchAccounts
      parameters:
      - name: query
        in: query
        description: "Search query (matched against uid, displayName, mail)"
        schema:
          type: string
      - name: limit
        in: query
        description: Max results to return (default 10)
        schema:
          type: integer
          format: int32
      - name: offset
        in: query
        description: Results to skip for pagination
        schema:
          type: integer
          format: int32
      - name: X-Carbonio-User-Id
        in: header
        schema:
          type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSearchResponse"
        "400":
          description: Missing X-Carbonio-User-Id header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Caller account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /accounts/mail/usage/{accountId}:
    get:
      summary: Get Mailbox usage
      description: Returns mail usage for the account mailbox
      operationId: getMailUsage
      parameters:
      - name: accountId
        in: path
        description: The account ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Mailbox usage in bytes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailUsageResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    AccountInfoResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        displayName:
          type: string
        cosId:
          type: string
        domainId:
          type: string
        domain:
          type: string
        status:
          type: string
          enum:
          - active
          - maintenance
          - locked
          - closed
          - lockout
          - pending
        isGlobalAdmin:
          type: boolean
        isExternal:
          type: boolean
        locale:
          type: string
        features:
          type: object
          additionalProperties:
            type: boolean
        capabilities:
          type: object
          additionalProperties:
            type: string
        sessionLifetimeMs:
          type: integer
          format: int64
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    BatchRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
        emails:
          type: array
          items:
            type: string
    SharedAccountResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        domainId:
          type: string
        cosId:
          type: string
    AccountSearchEntry:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
    AccountSearchResponse:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/AccountSearchEntry"
        total:
          type: integer
          format: int32
        more:
          type: boolean
    MailUsageResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        used:
          type: integer
          format: int64
